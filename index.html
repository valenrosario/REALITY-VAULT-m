<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y2K Streamz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Colores personalizados si es necesario
            }
          }
        }

    <!-- FUENTES: 'Syne' (Títulos Retro) y 'Inter' (Lectura) -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Ruffle Flash Player Emulator -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <style>
      /* ==========================================================================================
         ZONA DE EDICIÓN DE ESTILOS GLOBALES (CSS VARIABLES)
         ========================================================================================== */
      :root {
        --cursor-url: url('https://cur.cursors-4u.net/cursors/cur-2/cur126.cur'); /* Tu cursor */
        
        /* MODO CLARO (Default) */
        --color-bg-start: #ffffff;
        --color-bg-middle: #fff0f5;
        --color-bg-end: #fce7f3;
      }

      /* CONFIGURACIÓN BÁSICA */
      body {
        font-family: 'Inter', sans-serif;
        cursor: var(--cursor-url), auto;
        /* Gradiente suave de arriba hacia abajo que usa las variables dinámicas */
        background: linear-gradient(180deg, var(--color-bg-start) 0%, var(--color-bg-middle) 60%, var(--color-bg-end) 100%);
        background-attachment: fixed;
        min-height: 100vh;
        overflow-x: hidden;
        transition: background 0.5s ease; /* Transición suave al cambiar de tema */
      }

      .font-y2k {
        font-family: 'Syne', sans-serif;
      }

      /* SCROLLBAR PERSONALIZADO */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #f472b6;
        border-radius: 6px;
        border: 3px solid rgba(255, 255, 255, 0.5);
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #ec4899;
        border: 3px solid #1a0b2e;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ec4899;
      }

      /* ANIMACIONES */
      @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      .animate-marquee {
        display: inline-block;
        white-space: nowrap;
        animation: marquee 20s linear infinite;
      }

      @keyframes floatAndSpin {
        0% { transform: translateY(0) rotate(0deg) scale(1); }
        50% { transform: translateY(-10px) rotate(180deg) scale(1.1); }
        100% { transform: translateY(0) rotate(360deg) scale(1); }
      }
      .magic-star {
        animation: floatAndSpin 3s ease-in-out infinite;
      }
      
      .fade-in {
        animation: fadeIn 0.5s ease-out forwards;
        opacity: 0;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5); }
        70% { opacity: 1; transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1); }
      }
      
      .pop-in {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* CLASES DE UTILIDAD */
      .safe-img-container {
        position: relative;
        overflow: hidden;
        background-color: #fce7f3;
      }
      .dark .safe-img-container {
        background-color: #2d0f45;
      }
      
      .text-ellipsis-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
    </style>
